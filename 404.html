<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, follow" />
  <title>404 — Lehekülge ei leitud / Страница не найдена | Kiireost</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #ffffff;
      color: #101828;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      line-height: 1.5;
    }
    .wrap {
      max-width: 640px;
      width: 100%;
      text-align: center;
    }
    .logo {
      display: inline-flex;
      align-items: center;
      gap: .6rem;
      margin-bottom: 2rem;
      text-decoration: none;
      color: #0b2237;
      font-weight: 700;
    }
    .logo img { width: 36px; height: 36px; }
    .code {
      font-size: 5rem;
      font-weight: 800;
      letter-spacing: -.04em;
      color: #0b2237;
      margin: 0 0 .5rem;
      line-height: 1;
    }
    h1 { font-size: 1.5rem; margin: 0 0 1.5rem; color: #0b2237; }
    h1 .sep { color: #98a2b3; font-weight: 400; padding: 0 .5rem; }
    p { color: #475467; margin: 0 0 2rem; }
    .actions { display: flex; gap: .75rem; justify-content: center; flex-wrap: wrap; }
    .btn {
      display: inline-block;
      padding: .85rem 1.4rem;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn-primary { background: #0b2237; color: #ffffff; }
    .btn-secondary { background: #f2f4f7; color: #0b2237; }
  </style>
</head>
<body>
  <main class="wrap">
    <a class="logo" href="/">
      <img src="/favicon.svg" alt="" aria-hidden="true" />
      <span>Kiireost</span>
    </a>
    <div class="code">404</div>
    <h1>Lehekülge ei leitud<span class="sep">/</span>Страница не найдена</h1>
    <p>
      Otsitud lehte ei eksisteeri või see on teisaldatud.<br />
      Запрошенная страница не существует или была перемещена.
    </p>
    <div class="actions">
      <a class="btn btn-primary" href="/">Avalehele</a>
      <a class="btn btn-secondary" href="/ru/">На главную</a>
    </div>
  </main>
</body>
</html>
